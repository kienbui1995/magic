name: Bug Report
description: Report a bug in MagiC
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with ...
        2. Register worker ...
        3. Submit task ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MagiC version
      placeholder: "0.1.0"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core server (Go)
        - Python SDK
        - Docker
        - Documentation
